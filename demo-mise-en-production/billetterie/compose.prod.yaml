services:
  api:
    image: billetterie:${APP_VERSION}
    container_name: billetterie
    environment:
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: '${MEMORY_LIMIT:-2G}'
          cpus: '${CPU_LIMIT:-1.0}'
        reservations:
          memory: '${MEMORY_RESERVATION:-512M}'
          cpus: '${CPU_RESERVATION:-0.5}'
  db:
    restart: always