  build-and-test-image:
    runs-on: ubuntu-latest
    # Ce job attend que le lint ET les tests internes soient OK (si actifs)
    needs: [lint, test-internal]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Configuration Docker nécessaire pour Buildx
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build final image (local)
        uses: docker/build-push-action@v7
        with:
          target: production
          load: true
          tags: ${{ vars.DOCKER_USERNAME }}/billetterie:${{ github.sha }}

