      # # Triggering SonarQube analysis as results of it are required by Quality Gate check. Crée rapport qualité
      # - name: SonarQube Scan
      #   uses: sonarsource/sonarqube-scan-action@master
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # # # Check the Quality Gate status
      # # # Remarque : on le désactive pour ce projet pédagogique
      # # # car avec le plan gratuit SonarQube il faut au moins 80% de code coverage pour passer la Quality Gate
      # # - name: SonarQube Quality Gate check
