  # -------------------------------------------------------------
  # 4. Scan image + déploiement
  # -------------------------------------------------------------
  scan-deploy:
    runs-on: ubuntu-latest
    # On attend que les tests d'intégration (externes) soient validés
    needs: [build-and-test-image]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Scout CVE scan (gating)
        uses: docker/scout-action@v1
        with:
          image: ${{ vars.DOCKER_USERNAME }}/billetterie:${{ github.sha }}
          command: cves
          load: true
          only-severities: critical
          exit-code: true

      # -----------------------------
      # Push only if everything passed
      # -----------------------------
      - name: Push image
        run: |
          docker push ${{ vars.DOCKER_USERNAME }}/billetterie:${{ github.sha }}
          docker tag \
                     ${{ vars.DOCKER_USERNAME }}/billetterie:${{ github.sha }} \
                     ${{ vars.DOCKER_USERNAME }}/billetterie:latest
          docker push \
                     ${{ vars.DOCKER_USERNAME }}/billetterie:latest
